<div class="container">
    <h2>Form Pemesanan</h2>

    <input type="text" id="nama" placeholder="Nama Anda"><br><br>

    <select id="menu" onchange="hitungTotal()">
        <option value="27000">Martabak Coklat - 27.000</option>
        <option value="30000">Martabak Keju - 30.000</option>
        <option value="35000">Martabak Mix - 35.000</option>
    </select><br><br>

    <input type="number" id="jumlah" placeholder="Jumlah" oninput="hitungTotal()"><br><br>

    <p id="totalHarga">Total: Rp0</p>

    <textarea id="catatan" placeholder="Catatan tambahan"></textarea><br><br>

    <button class="btn" onclick="kirimPesanan()">Pesan Sekarang</button>
</div>

<br><br>

   💬 Chat

<script>
function hitungTotal() {
    var menu = document.getElementById("menu");
    var harga = parseInt(menu.value);

    var jumlah = parseInt(document.getElementById("jumlah").value);

    if (!jumlah || jumlah < 1) {
        document.getElementById("totalHarga").innerText = "Total: Rp0";
        return;
    }

    var total = harga * jumlah;
    var totalFormat = total.toLocaleString("id-ID");

    document.getElementById("totalHarga").innerText = "Total: Rp" + totalFormat;
}

function kirimPesanan() {
    var nama =
     document.getElementById("nama").value.trim();
    var menu = document.getElementById("menu");
    var menuText =
     menu.options[menu.selectedIndex].text;
    var harga = parseInt(menu.value);
    var jumlah =
     parseInt(document.getElementById("jumlah").value);
    var catatan =
     document.getElementById("catatan").value.trim();

    if (!nama || !jumlah || jumlah < 1) {
        alert("Isi nama dan jumlah dengan benar ya!");
        return;
    }

    var total = harga * jumlah;
    var totalFormat = total.toLocaleString("id-ID");

    var pesan = `Halo, saya ingin pesan:
Nama: ${nama}
Menu: ${menuText}
Jumlah: ${jumlah}
Total: Rp${totalFormat}
Catatan: ${catatan}`;

    var url = "https://api.whatsapp.com/send?phone=6281291641437&text=" + encodeURIComponent(pesan);

    // 🔥 LOADING EFFECT
    var btn = document.querySelector(".btn");
    btn.innerText = "Memproses...";
    btn.disabled = true;

    setTimeout(function() {
        window.open(url, "_blank");

        btn.innerText = "Pesan Sekarang";
        btn.disabled = false;

        document.getElementById("nama").value = "";
        document.getElementById("jumlah").value = "";
        document.getElementById("catatan").value = "";
        document.getElementById("totalHarga").innerText = "Total: Rp0";
    }, 1500);
}
</script>
